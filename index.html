<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA Quiz</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300d4aa'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='%230a0e1a' font-weight='bold'%3E%C2%A7%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2235;
    --accent: #00d4aa;
    --accent2: #3b82f6;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --border: #263347;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background-color: #0a0e1a;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,212,170,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.07) 0%, transparent 60%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease;
  }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    font-weight: 900;
    font-size: 10px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .header h1 { font-size: 24px; font-weight: 900; }
  .header p { color: #94a3b8; font-size: 13.5px; margin-top: 4px; }

  .tutorial-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 100%;
  }
  .tab {
    background: #111827;
    border: 1.5px solid #263347;
    color: #94a3b8;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { border-color: #00d4aa; color: #00d4aa; }
  .tab.active {
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    border-color: transparent;
  }

  .top-bar {
    width: 100%;
    max-width: 680px;
    margin-bottom: 14px;
  }
  .progress-bar-wrap {
    background: #1a2235;
    border-radius: 20px;
    height: 7px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00d4aa, #3b82f6);
    border-radius: 20px;
    transition: width 0.4s ease;
  }

  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: #111827;
    border: 1px solid #263347;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12.5px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .quiz-card {
    background: #111827;
    border: 1px solid #263347;
    border-radius: 20px;
    padding: 24px 20px;
    max-width: 680px;
    width: 100%;
    animation: fadeUp 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00d4aa, #3b82f6);
  }

  .q-number { font-size: 11px; color: #94a3b8; font-weight: 700; margin-bottom: 8px; }
  .q-text {
    font-size: 15.5px;
    font-weight: 700;
    line-height: 1.75;
    margin-bottom: 20px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: #1a2235;
    border: 1.5px solid #263347;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    text-align: right;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-direction: row-reverse;
    width: 100%;
  }
  .option:hover:not(:disabled) {
    border-color: #3b82f6;
    background: rgba(59,130,246,0.1);
    transform: translateX(-3px);
  }

  .opt-label {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: #263347;
    color: #94a3b8;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .feedback.show-fb { display: block; }

  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 140px;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
  }
  .btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0, 212, 170, 0.4);
  }
  .btn.secondary {
    background: #1a2235;
    color: #94a3b8;
    border: 1.5px solid #263347;
    box-shadow: none;
  }
  .btn.secondary:hover {
    border-color: #3b82f6;
    color: #e2e8f0;
    background: #242e4a;
  }

  /* Result */
  .result-screen {
    max-width: 680px;
    width: 100%;
    text-align: center;
    display: none;
  }
  .result-screen.show { display: block; }
  .result-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    font-weight: 900;
    color: #0a0e1a;
    box-shadow: 0 0 50px rgba(0,212,170,0.3);
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 16px 10px 30px; }
    .header h1 { font-size: 21px; }
    .quiz-card { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .option { padding: 13px 14px; font-size: 13.5px; }
    .btn { padding: 13px 22px; font-size: 14px; }
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="badge">CCNA QUIZ</div>
  <h1>🎓 اختبر نفسك في CCNA</h1>
  <p>اختار التيوتريال واجاوب الأسئلة</p>
</div>

<div class="tutorial-tabs" id="tabs"></div>

<div class="top-bar">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="dot dot-green"></div><span id="correctCount">0</span> صح</div>
    <div class="stat"><div class="dot dot-red"></div><span id="wrongCount">0</span> غلط</div>
    <div class="stat"><div class="dot dot-gray"></div><span id="remainCount">0</span> باقي</div>
  </div>
</div>

<div class="quiz-card" id="quizCard">
  <div class="q-number" id="qNumber"></div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div class="nav-btns">
    <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none">التالي ←</button>
    <button class="btn secondary" onclick="restartQuiz()">🔄 إعادة</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-circle" id="resultScore"></div>
  <h2 id="resultTitle"></h2>
  <p id="resultMsg"></p>
  <button class="btn" onclick="restartQuiz()">🔄 العب تاني</button>
</div>

let currentTutorial = Object.keys(tutorials)[0];
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function loadTutorial(name) {
  currentTutorial = name;
  questions = [...tutorials[name]];
  current = 0; correct = 0; wrong = 0; answered = false;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.name === name));
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';
  renderQuestion();
  updateStats();
}

function renderQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  const q = questions[current];
  document.getElementById('qNumber').textContent = 'سؤال ' + (current + 1) + ' من ' + questions.length;
  document.getElementById('qText').textContent = q.q;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const labels = ['أ', 'ب', 'ج', 'د'];
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span>' + opt + '</span>';
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.disabled = true);

  const fb = document.getElementById('feedback');
  if (idx === q.ans) {
    opts[idx].classList.add('correct');
    correct++;
    fb.textContent = '✅ إجابة صحيحة! 🎉';
    fb.className = 'feedback show-fb fb-correct';
  } else {
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    wrong++;
    fb.textContent = '❌ غلط! الإجابة الصحيحة: ' + q.opts[q.ans];
    fb.className = 'feedback show-fb fb-wrong';
  }

  document.getElementById('nextBtn').style.display = 'block';
  updateStats();
}

function nextQuestion() {
  current++;
  renderQuestion();
  updateStats();
}

function updateStats() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('remainCount').textContent = Math.max(0, questions.length - current);
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('progressBar').style.width = '100%';
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('resultScore').textContent = pct + '%';
  let title, msg;
  if (pct >= 80)      { title = '🏆 ممتاز جداً!';   msg = 'أجبت صح على ' + correct + ' من ' + questions.length + ' — شاطر!'; }
  else if (pct >= 60) { title = '👍 كويس!';          msg = 'أجبت صح على ' + correct + ' من ' + questions.length + ' — تقدر أحسن!'; }
  else                { title = '💪 حاول تاني!';     msg = 'أجبت صح على ' + correct + ' من ' + questions.length + ' — راجع المادة وحاول تاني.'; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz() { loadTutorial(currentTutorial); }

// Build tabs
const tabsEl = document.getElementById('tabs');
Object.keys(tutorials).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.name = name;
  btn.textContent = name;
  btn.onclick = () => loadTutorial(name);
  tabsEl.appendChild(btn);
});

loadTutorial(currentTutorial);
</script>
