<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Quiz & Review</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300d4aa'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='%230a0e1a' font-weight='bold'%3E%C2%A7%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2235;
    --accent: #00d4aa;
    --accent2: #3b82f6;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --border: #263347;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background-color: #0a0e1a;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,212,170,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.07) 0%, transparent 60%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease;
  }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    font-weight: 900;
    font-size: 10px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .header h1 { font-size: 24px; font-weight: 900; }
  .header p { color: #94a3b8; font-size: 13.5px; margin-top: 4px; }

  .tutorial-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 100%;
  }
  .tab {
    background: #111827;
    border: 1.5px solid #263347;
    color: #94a3b8;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { border-color: #00d4aa; color: #00d4aa; }
  .tab.active {
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    border-color: transparent;
  }

  .top-bar {
    width: 100%;
    max-width: 680px;
    margin-bottom: 14px;
  }
  .progress-bar-wrap {
    background: #1a2235;
    border-radius: 20px;
    height: 7px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00d4aa, #3b82f6);
    border-radius: 20px;
    transition: width 0.4s ease;
  }

  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: #111827;
    border: 1px solid #263347;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12.5px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .quiz-card {
    background: #111827;
    border: 1px solid #263347;
    border-radius: 20px;
    padding: 24px 20px;
    max-width: 680px;
    width: 100%;
    animation: fadeUp 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00d4aa, #3b82f6);
  }

  .summary-content h3 {
    color: #00d4aa;
    margin-top: 15px;
    margin-bottom: 10px;
    font-size: 17px;
    border-bottom: 1px solid #263347;
    padding-bottom: 5px;
  }
  .summary-content ul {
    padding-right: 20px;
    font-size: 14.5px;
    color: #e2e8f0;
    line-height: 1.8;
  }
  .summary-content li { margin-bottom: 6px; }

  .q-number { font-size: 12px; color: #94a3b8; font-weight: 700; margin-bottom: 8px; }
  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.75;
    margin-bottom: 20px;
    direction: ltr;
    text-align: left;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: #1a2235;
    border: 1.5px solid #263347;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    color: #e2e8f0;
    text-align: left;
    direction: ltr;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .option:hover:not(:disabled) {
    border-color: #3b82f6;
    background: rgba(59,130,246,0.1);
    transform: translateX(-3px);
  }
  .option.correct {
    border-color: #00d4aa;
    background: rgba(0, 212, 170, 0.1);
  }
  .option.wrong {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.1);
  }

  .opt-label {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: #263347;
    color: #94a3b8;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .feedback.show-fb { display: block; }
  .fb-correct { background: rgba(0,212,170,0.15); color: #00d4aa; }
  .fb-wrong { background: rgba(239,68,68,0.15); color: #ef4444; }

  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 140px;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    color: #0a0e1a;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
  }
  .btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0, 212, 170, 0.4);
  }
  .btn.secondary {
    background: #1a2235;
    color: #94a3b8;
    border: 1.5px solid #263347;
    box-shadow: none;
  }
  .btn.secondary:hover {
    border-color: #3b82f6;
    color: #e2e8f0;
    background: #242e4a;
  }

  /* Result */
  .result-screen {
    max-width: 680px;
    width: 100%;
    text-align: center;
    display: none;
  }
  .result-screen.show { display: block; }
  .result-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d4aa, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    font-weight: 900;
    color: #0a0e1a;
    box-shadow: 0 0 50px rgba(0,212,170,0.3);
  }

  @media (max-width: 480px) {
    body { padding: 16px 10px 30px; }
    .header h1 { font-size: 21px; }
    .quiz-card { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .option { padding: 13px 14px; font-size: 13.5px; }
    .btn { padding: 13px 22px; font-size: 14px; }
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="badge">JAVA EXAM PREP</div>
  <h1>🎓 راجع واختبر نفسك في Java</h1>
  <p>اختار القسم اللي عايز تذاكره أو تحل عليه</p>
</div>

<div class="tutorial-tabs" id="tabs"></div>

<div class="top-bar" id="topBar" style="display: none;">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="dot dot-green"></div><span id="correctCount">0</span> صح</div>
    <div class="stat"><div class="dot dot-red"></div><span id="wrongCount">0</span> غلط</div>
    <div class="stat"><div class="dot dot-gray"></div><span id="remainCount">0</span> باقي</div>
  </div>
</div>

<div class="quiz-card" id="quizCard">
  <div id="summaryArea" class="summary-content" style="display: none; direction: rtl; text-align: right;"></div>
  
  <div id="quizArea" style="display: none;">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="nav-btns">
    <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none">التالي ←</button>
    <button class="btn secondary" id="restartBtn" onclick="restartQuiz()" style="display:none">🔄 إعادة</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-circle" id="resultScore"></div>
  <h2 id="resultTitle"></h2>
  <p id="resultMsg" style="margin-bottom: 20px; color: #94a3b8;"></p>
  <button class="btn" onclick="restartQuiz()">🔄 العب تاني</button>
</div>

<script>
const tutorials = {
  "ملخص المحاضرات (1-8)": { type: "summary", content: `
    <h3>المحاضرة 1: مقدمة في Java</h3>
    <ul>
      <li>لغة برمجة تعتمد على الكائنات (OOP) تعمل على منصات مختلفة.</li>
      <li><b>JDK:</b> يحتوي على أدوات التطوير و JRE.</li>
      <li><b>JRE:</b> يحتوي على المكتبات و JVM.</li>
      <li><b>JVM:</b> البيئة الافتراضية اللي بتشغل الـ Byte Code.</li>
      <li><b>أنواع البيانات (Primitive):</b> مثل (byte, short, int, long, float, double, boolean, char).</li>
    </ul>
    <h3>المحاضرة 2: المعاملات والشروط (Operators & Conditions)</h3>
    <ul>
      <li><b>التحويل (Type Casting):</b> إما Widening (تلقائي من صغير لكبير) أو Narrowing (يدوي من كبير لصغير).</li>
      <li><b>فئة Scanner:</b> تستخدم لأخذ الإدخال من المستخدم.</li>
      <li><b>المعاملات (Operators):</b> حسابية، منطقية (&&, ||, !)، ومقارنة.</li>
      <li><b>الجمل الشرطية:</b> if, else if, switch, والعامل الثلاثي (Ternary Operator <code>? :</code>).</li>
    </ul>
    <h3>المحاضرة 3: التكرار والمصفوفات (Loops & Arrays)</h3>
    <ul>
      <li><b>حلقات التكرار (Loops):</b> while, do/while (تنفذ مرة واحدة على الأقل)، for.</li>
      <li><b>التحكم:</b> <code>break</code> تخرج من اللوب، <code>continue</code> تتخطى الدورة الحالية وتكمل اللوب.</li>
      <li><b>المصفوفات (Arrays):</b> حجمها ثابت، يبدأ الـ Index من 0، ونعرف طولها بـ <code>.length</code>.</li>
    </ul>
    <h3>المحاضرة 4: الدوال (Methods)</h3>
    <ul>
      <li>الدالة تنفذ كود معين عند استدعائها ويمكن أن تأخذ Parameters وترجع قيمة (Return).</li>
      <li><b>Method Overloading:</b> دوال بنفس الاسم لكن بـ Parameters مختلفة.</li>
      <li><b>المتغيرات (Variable Arguments):</b> نستخدم <code>...</code> لتمرير عدد غير محدد من البارامترات (مثل <code>int... numbers</code>).</li>
      <li><b>الاستدعاء الذاتي (Recursion):</b> عندما تستدعي الدالة نفسها.</li>
    </ul>
    <h3>المحاضرة 5: مبادئ الـ OOP</h3>
    <ul>
      <li><b>Class:</b> المخطط (Blueprint) اللي بننشئ منه الكائنات.</li>
      <li><b>Object:</b> كائن فعلي من الكلاس.</li>
      <li><b>Encapsulation:</b> تغليف البيانات وتخبئتها (private) والوصول لها عبر getter/setter.</li>
      <li><b>Inheritance:</b> الوراثة من كلاس أب باستخدام <code>extends</code>.</li>
      <li><b>Polymorphism:</b> تعدد الأشكال (إما Overloading في وقت الترجمة، أو Overriding في وقت التشغيل).</li>
      <li><b>Abstraction:</b> إخفاء تفاصيل التنفيذ وإظهار الوظيفة فقط باستخدام Abstract class أو Interface.</li>
    </ul>
    <h3>المحاضرة 6: المشيدات (Constructors)</h3>
    <ul>
      <li>دالة خاصة لاستدعاء وإنشاء الكائن، اسمها نفس اسم الكلاس ولا يوجد لها نوع إرجاع.</li>
      <li><b>أنواعها:</b> Default (يوفره الكومبايلر)، No-Args، و Parameterized.</li>
    </ul>
    <h3>المحاضرة 7: الـ this و ArrayList</h3>
    <ul>
      <li><b>كلمة <code>this</code>:</b> تشير للكائن الحالي، وتستخدم للتفريق بين المتغيرات.</li>
      <li><b>ArrayList:</b> مصفوفة مرنة الحجم، نستخدم معاها <code>add()</code>, <code>get()</code>, <code>set()</code>, <code>remove()</code>, و <code>size()</code>.</li>
      <li><b>Wrapper Classes:</b> نستخدمها مع الـ ArrayList لتمثيل البيانات البدائية ككائنات (مثل Integer بدل int).</li>
    </ul>
    <h3>المحاضرة 8: التاريخ والوقت (Date & Time)</h3>
    <ul>
      <li>نستخدم كلاسات مثل <code>LocalDate</code> و <code>LocalTime</code> و <code>LocalDateTime</code>.</li>
      <li><b>DateTimeFormatter:</b> لتنسيق شكل الوقت والتاريخ (مثل <code>dd-MM-yyyy</code>).</li>
      <li><b>Enums:</b> لإنشاء مجموعة ثوابت لا تتغير (مثل أيام الأسبوع).</li>
    </ul>` 
  },

  "Midterm Java": { type: "quiz", questions: [
    { q: "Java enables you to pass a variable number of arguments of the same type to a method.", opts: ["True", "False"], ans: 0, expl: "True - Using Varargs (...)" },
    { q: "The character (#) is used in Java language to comment multiple lines of codes.", opts: ["True", "False"], ans: 1, expl: "False - /* */ is used for multi-line comments." },
    { q: "Static method can be accessed by creating an object of the class.", opts: ["True", "False"], ans: 1, expl: "False - Static methods belong to the class and are called directly." },
    { q: "Object is a template for class, and a class is an instance of an object.", opts: ["True", "False"], ans: 1, expl: "False - It's the exact opposite." },
    { q: "If one task is performed in different ways, it is known as polymorphism.", opts: ["True", "False"], ans: 0, expl: "True" },
    { q: "Showing class internal details and showing functionality is known as abstraction.", opts: ["True", "False"], ans: 1, expl: "False - Abstraction HIDES internal details." },
    { q: "Method overloading and method overriding are used to achieve polymorphism.", opts: ["True", "False"], ans: 0, expl: "True" },
    { q: "Encapsulation refers to binding (or wrapping) code and data together into a single unit.", opts: ["True", "False"], ans: 0, expl: "True" },
    { q: "OOPs is a methodology that simplifies software development and maintenance.", opts: ["True", "False"], ans: 0, expl: "True" },
    { q: "Static keyword refers that attributes/methods belongs to the class, rather than an object.", opts: ["True", "False"], ans: 0, expl: "True" },
    { q: "Which of the following symbols is used to make a comment in Java?", opts: ["#", "//", "%", "-"], ans: 1, expl: "// is for single line comments." },
    { q: "Which of the following variables' names are accepted in Java?", opts: ["Var_1", "$Var", "2var", "Both a & b"], ans: 3, expl: "Variables cannot start with a number." },
    { q: "Application software is usually written in:", opts: ["Machine Language", "High-level Language", "Assembly Language", "Low-level language"], ans: 1, expl: "Java is a High-Level Language." },
    { q: "If you have Strings: str1=\"NICE\", str2=\"BOY\" and you execute: println(str1+str2) it will show:", opts: ["NICE", "BOY", "NICE BOY", "NICEBOY"], ans: 3, expl: "It concatenates without a space." },
    { q: "Which of the following statements is used to skip a specific iteration of the loop?", opts: ["Continue", "Break", "Both a and b", "None of these"], ans: 0, expl: "Continue skips, Break exits the loop." },
    { q: "A function is a block of _______ code that is used to perform a single, related action.", opts: ["organized", "reusable", "Pseudo code", "Both a and b"], ans: 3, expl: "Functions are organized and reusable." },
    { q: "What will be the output: x=5, y=20, z=15; L = (z > (x<y ? x : y)) ? z : ((x<y) ? x : y); System.out.println(L);", opts: ["20", "15", "5", "Error"], ans: 1, expl: "(x<y ? x : y) is 5. Then (15 > 5) is True, so it returns z (15)." },
    { q: "What will be the output: int d=6; switch(d) { case 6: print(\"x\"); case 7: print(\"y\"); break; default: print(\"z\"); }", opts: ["x", "x then y", "x then z", "z"], ans: 1, expl: "Because there is no 'break' after case 6, it prints 'x' and falls through to print 'y'." },
    { q: "What will be the output: String[] cars = {\"Volvo\", \"BMW\", \"Ford\"}; for (String i in cars) { print(i); }", opts: ["Volvo BMW Ford", "BMW Ford", "Error", "None of these"], ans: 2, expl: "Error - Syntax is wrong. In Java it should be (String i : cars) not 'in'." },
    { q: "What will be the output: static int count = 1; Main() { count++; print(count); } Main c1=new Main(); Main c2=new Main(); Main c3=new Main();", opts: ["2 3 4", "1 1 1", "2 2 2", "1 2 3"], ans: 0, expl: "Because count is static, its value persists and increments across objects." }
  ]},

  "Tutorial Java 1 to 7": { type: "quiz", questions: [
    { q: "سيتم إضافة الأسئلة قريباً...", opts: ["موافق"], ans: 0 }
  ]},

  "Assignment 1 & 2": { type: "quiz", questions: [
    { q: "سيتم إضافة الأسئلة قريباً...", opts: ["موافق"], ans: 0 }
  ]},

  "Activity 1 to 3": { type: "quiz", questions: [
    { q: "سيتم إضافة الأسئلة قريباً...", opts: ["موافق"], ans: 0 }
  ]},

  "Full Exam": { type: "quiz", questions: [
    { q: "سيتم تجميع كل الأسئلة هنا قريباً...", opts: ["موافق"], ans: 0 }
  ]}
};

let currentTutorial = Object.keys(tutorials)[0];
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function loadTutorial(name) {
  currentTutorial = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.name === name));
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';

  const tut = tutorials[name];
  if (tut.type === "summary") {
    document.getElementById('topBar').style.display = 'none';
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('summaryArea').style.display = 'block';
    document.getElementById('summaryArea').innerHTML = tut.content;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('restartBtn').style.display = 'none';
  } else {
    questions = [...tut.questions];
    current = 0; correct = 0; wrong = 0; answered = false;
    document.getElementById('topBar').style.display = 'flex';
    document.getElementById('summaryArea').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('restartBtn').style.display = 'block';
    renderQuestion();
    updateStats();
  }
}

function renderQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  const q = questions[current];
  document.getElementById('qNumber').textContent = 'Question ' + (current + 1) + ' of ' + questions.length;
  document.getElementById('qText').textContent = q.q;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const labels = ['A', 'B', 'C', 'D'];
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span>' + opt + '</span>';
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.disabled = true);

  const fb = document.getElementById('feedback');
  if (idx === q.ans) {
    opts[idx].classList.add('correct');
    correct++;
    fb.textContent = '✅ Correct! ' + (q.expl ? '- ' + q.expl : '');
    fb.className = 'feedback show-fb fb-correct';
  } else {
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    wrong++;
    fb.textContent = '❌ Wrong! ' + (q.expl ? q.expl : 'The correct answer is: ' + q.opts[q.ans]);
    fb.className = 'feedback show-fb fb-wrong';
  }

  document.getElementById('nextBtn').style.display = 'block';
  updateStats();
}

function nextQuestion() {
  current++;
  renderQuestion();
  updateStats();
}

function updateStats() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('remainCount').textContent = Math.max(0, questions.length - current);
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('topBar').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('progressBar').style.width = '100%';
  
  const pct = questions.length > 0 ? Math.round((correct / questions.length) * 100) : 0;
  document.getElementById('resultScore').textContent = pct + '%';
  
  let title, msg;
  if (pct >= 80)      { title = '🏆 Excellent!';   msg = 'You answered ' + correct + ' out of ' + questions.length + ' correctly.'; }
  else if (pct >= 60) { title = '👍 Good job!';    msg = 'You answered ' + correct + ' out of ' + questions.length + ' correctly.'; }
  else                { title = '💪 Keep trying!'; msg = 'You answered ' + correct + ' out of ' + questions.length + ' correctly. Review the summary and try again!'; }
  
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz() { loadTutorial(currentTutorial); }

// Build tabs
const tabsEl = document.getElementById('tabs');
Object.keys(tutorials).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.name = name;
  btn.textContent = name;
  btn.onclick = () => loadTutorial(name);
  tabsEl.appendChild(btn);
});

loadTutorial(currentTutorial);
</script>
</body>
</html>
